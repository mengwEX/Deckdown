name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

permissions:
  contents: read

jobs:
  build:
    name: Build and validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.12.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck packages and app
        run: pnpm check

      - name: Build packages and app
        run: pnpm build

      - name: Validate canonical deck
        run: pnpm validate

      - name: Render HTML smoke artifact
        run: pnpm --filter @deckdown/cli deckdown render packages/examples/decks/chordedit.dd --out dist/ci/chordedit.html

      - name: Upload rendered HTML artifact
        uses: actions/upload-artifact@v4
        with:
          name: chordedit-html
          path: dist/ci/chordedit.html
          if-no-files-found: error
